<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClawSquad - Escritório Virtual 2D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #14141f;
            --accent: #00d4ff;
            --accent-dim: #00d4ff33;
            --success: #00ff88;
            --warning: #ffaa00;
            --error: #ff4444;
            --text: #ffffff;
            --text-dim: #8888aa;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: var(--bg-card);
            padding: 20px 30px;
            border-bottom: 1px solid var(--accent-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--accent), #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--error);
        }

        .status-dot.connected {
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main {
            display: flex;
            height: calc(100vh - 80px);
        }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            padding: 20px;
            border-right: 1px solid var(--accent-dim);
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 14px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .agent-item {
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .agent-item:hover {
            border-color: var(--accent);
        }

        .agent-item.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .agent-item .name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .agent-item .status {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 5px;
        }

        .agent-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .office {
            flex: 1;
            position: relative;
            background: 
                radial-gradient(circle at 20% 80%, var(--accent-dim) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, #00ff8833 0%, transparent 50%),
                var(--bg-dark);
        }

        .office-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(var(--accent-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-dim) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }

        .agents-on-office {
            position: absolute;
            inset: 0;
            padding: 40px;
        }

        .agent-avatar {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 3px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px var(--accent-dim);
        }

        .agent-avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px var(--accent);
        }

        .agent-avatar .icon {
            font-size: 30px;
        }

        .agent-avatar .label {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .agent-avatar .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--bg-card);
        }

        .agent-avatar .status-dot.idle { background: var(--text-dim); }
        .agent-avatar .status-dot.working { background: var(--warning); animation: pulse 1s infinite; }
        .agent-avatar .status-dot.done { background: var(--success); }
        .agent-avatar .status-dot.error { background: var(--error); }

        .pipeline-flow {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--bg-card);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--accent-dim);
        }

        .pipeline-step {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .pipeline-step.active {
            color: var(--accent);
        }

        .pipeline-step.done {
            color: var(--success);
        }

        .pipeline-arrow {
            color: var(--accent-dim);
        }

        .checkpoint-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .checkpoint-modal.show {
            display: flex;
        }

        .checkpoint-content {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--warning);
            max-width: 500px;
            text-align: center;
        }

        .checkpoint-content h2 {
            color: var(--warning);
            margin-bottom: 15px;
        }

        .checkpoint-content p {
            margin-bottom: 20px;
            color: var(--text-dim);
        }

        .checkpoint-btn {
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.2s;
        }

        .checkpoint-btn.approve {
            background: var(--success);
            color: #000;
        }

        .checkpoint-btn.reject {
            background: var(--error);
            color: #fff;
        }

        .activity-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            max-height: 180px;
            overflow-y: auto;
        }

        .activity-panel h3 {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .activity-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--accent-dim);
            font-size: 13px;
            display: flex;
            gap: 10px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-item .time {
            color: var(--text-dim);
            font-size: 11px;
            min-width: 50px;
        }

        .activity-item .message {
            flex: 1;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--accent-dim);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--accent);
            color: #000;
        }

        .agent-detail {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            display: none;
            border: 1px solid var(--accent-dim);
        }

        .agent-detail.show {
            display: block;
        }

        .agent-detail h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .agent-detail .role {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .agent-detail .task {
            background: var(--bg-dark);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        .agent-detail .task-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 5px;
        }

        .log-console {
            position: absolute;
            bottom: 220px;
            left: 20px;
            right: 20px;
            background: #0d0d12;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }

        .log-console.show {
            display: block;
        }

        .log-line {
            padding: 2px 0;
        }

        .log-line .time {
            color: var(--text-dim);
        }

        .log-line.agent {
            color: var(--accent);
        }

        .log-line.system {
            color: var(--warning);
        }

        .log-line.error {
            color: var(--error);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🦞</div>
            <h1>OpenClawSquad</h1>
        </div>
        <div class="connection-status">
            <span class="status-dot" id="wsStatus"></span>
            <span id="wsText">Conectando...</span>
        </div>
    </header>

    <main class="main">
        <aside class="sidebar">
            <h2>Agentes</h2>
            <div class="agent-list" id="agentList"></div>
        </aside>

        <div class="office">
            <div class="office-grid"></div>
            <div class="agents-on-office" id="office"></div>

            <div class="pipeline-flow" id="pipeline">
                <div class="pipeline-step" data-step="1">🔍 Pesquisa</div>
                <span class="pipeline-arrow">→</span>
                <div class="pipeline-step" data-step="2">🧠 Estratégia</div>
                <span class="pipeline-arrow">→</span>
                <div class="pipeline-step" data-step="3">✍️ Criação</div>
                <span class="pipeline-arrow">→</span>
                <div class="pipeline-step" data-step="4">✅ Revisão</div>
            </div>

            <div class="controls">
                <button class="control-btn" onclick="runDemo()">▶️ Executar Squad</button>
                <button class="control-btn" onclick="toggleConsole()">📝 Console</button>
            </div>

            <div class="agent-detail" id="agentDetail">
                <h3 id="detailName">Agente</h3>
                <p class="role" id="detailRole">Papel</p>
                <div class="task">
                    <div class="task-label">Tarefa atual:</div>
                    <div id="detailTask">-</div>
                </div>
            </div>

            <div class="log-console" id="logConsole"></div>

            <div class="activity-panel">
                <h3>Atividade em Tempo Real</h3>
                <div id="activityList"></div>
            </div>
        </div>
    </main>

    <div class="checkpoint-modal" id="checkpointModal">
        <div class="checkpoint-content">
            <h2>⏸️ Checkpoint</h2>
            <p id="checkpointMessage">Aprovação necessária para continuar</p>
            <button class="checkpoint-btn approve" onclick="approveCheckpoint()">✅ Aprovar</button>
            <button class="checkpoint-btn reject" onclick="rejectCheckpoint()">❌ Rejeitar</button>
        </div>
    </div>

    <script>
        // WebSocket connection
        let ws;
        let currentAgents = [];
        let logs = [];
        
        function connect() {
            ws = new WebSocket('ws://localhost:3001');
            
            ws.onopen = () => {
                document.getElementById('wsStatus').classList.add('connected');
                document.getElementById('wsText').textContent = 'Conectado';
                addLog('system', 'Conectado ao servidor');
            };
            
            ws.onclose = () => {
                document.getElementById('wsStatus').classList.remove('connected');
                document.getElementById('wsText').textContent = 'Desconectado';
                addLog('error', 'Conexão perdida - reconectando...');
                setTimeout(connect, 3000);
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'init':
                    if (msg.data.squads && msg.data.squads[0]) {
                        loadSquad(msg.data.squads[0]);
                    }
                    if (msg.data.activities) {
                        msg.data.activities.forEach(a => addActivity(a.time, a.agent, a.message));
                    }
                    break;
                    
                case 'squad_started':
                    loadSquad(msg.data);
                    break;
                    
                case 'agent_updated':
                    updateAgentStatus(msg.data.agentId, msg.data.status, msg.data.task);
                    break;
                    
                case 'activity':
                    addActivity(msg.data.time, msg.data.agent, msg.data.message);
                    break;
                    
                case 'checkpoint':
                    showCheckpoint(msg.data);
                    break;
            }
        }

        function loadSquad(squad) {
            currentAgents = squad.agents || [];
            renderAgents();
            addLog('system', `Squad "${squad.name}" carregado`);
        }

        function renderAgents() {
            // Render sidebar
            const list = document.getElementById('agentList');
            list.innerHTML = currentAgents.map(agent => `
                <div class="agent-item" data-id="${agent.id}">
                    <div class="name">
                        <div class="agent-icon" style="background: var(--accent-dim)">${agent.icon}</div>
                        ${agent.name}
                    </div>
                    <div class="status" id="status-${agent.id}">Aguardando</div>
                </div>
            `).join('');

            // Render office
            const office = document.getElementById('office');
            office.innerHTML = currentAgents.map((agent, i) => {
                const pos = agent.position || { x: 100 + (i * 120), y: 150 };
                return `
                    <div class="agent-avatar" style="left: ${pos.x}px; top: ${pos.y}px" 
                          data-id="${agent.id}"
                          onmouseover="showAgentDetail('${agent.id}')"
                          onmouseout="hideAgentDetail()">
                        <span class="icon">${agent.icon}</span>
                        <span class="label">${agent.name.split(' ')[0]}</span>
                        <span class="status-dot idle" id="dot-${agent.id}"></span>
                    </div>
                `;
            }).join('');
        }

        function updateAgentStatus(agentId, status, task) {
            // Update sidebar
            const statusEl = document.getElementById(`status-${agentId}`);
            if (statusEl) {
                const texts = { idle: 'Aguardando', working: 'Trabalhando', done: 'Concluído', error: 'Erro' };
                statusEl.textContent = texts[status] || status;
            }
            
            // Update dot
            const dotEl = document.getElementById(`dot-${agentId}`);
            if (dotEl) {
                dotEl.className = `status-dot ${status}`;
            }
            
            // Update task
            const taskEl = document.getElementById('detailTask');
            if (taskEl && document.getElementById('agentDetail').classList.contains('show')) {
                const current = currentAgents.find(a => a.id === agentId);
                if (current) taskEl.textContent = task || current.task || '-';
            }
        }

        function showAgentDetail(id) {
            const agent = currentAgents.find(a => a.id === id);
            if (!agent) return;
            
            document.getElementById('detailName').textContent = agent.name;
            document.getElementById('detailRole').textContent = agent.role || agent.title || '';
            document.getElementById('detailTask').textContent = agent.task || '-';
            document.getElementById('agentDetail').classList.add('show');
        }

        function hideAgentDetail() {
            document.getElementById('agentDetail').classList.remove('show');
        }

        function addActivity(time, agent, message) {
            const list = document.getElementById('activityList');
            const item = document.createElement('div');
            item.className = 'activity-item';
            item.innerHTML = `<span class="time">${time}</span><span class="message">${agent}: ${message}</span>`;
            list.insertBefore(item, list.firstChild);
            
            if (list.children.length > 10) {
                list.removeChild(list.lastChild);
            }
        }

        function addLog(type, message) {
            logs.push({ type, message, time: new Date().toLocaleTimeString() });
            
            const console = document.getElementById('logConsole');
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            line.innerHTML = `<span class="time">[${new Date().toLocaleTimeString()}]</span> ${message}`;
            console.insertBefore(line, console.firstChild);
        }

        function toggleConsole() {
            document.getElementById('logConsole').classList.toggle('show');
        }

        function showCheckpoint(data) {
            document.getElementById('checkpointMessage').textContent = data.message;
            document.getElementById('checkpointModal').classList.add('show');
        }

        function approveCheckpoint() {
            document.getElementById('checkpointModal').classList.remove('show');
            ws.send(JSON.stringify({ type: 'checkpoint_response', approved: true }));
            addLog('system', 'Checkpoint aprovado');
        }

        function rejectCheckpoint() {
            document.getElementById('checkpointModal').classList.remove('show');
            ws.send(JSON.stringify({ type: 'checkpoint_response', approved: false }));
            addLog('error', 'Checkpoint rejeitado');
        }

        function runDemo() {
            addLog('system', 'Iniciando execução do squad...');
            
            // Simular pipeline
            const steps = ['researcher', 'strategist', 'writer', 'reviewer'];
            
            steps.forEach((agentId, i) => {
                setTimeout(() => {
                    updateAgentStatus(agentId, 'working', 'Processando...');
                    addLog('agent', `${agentId}: Executando tarefa...`);
                    
                    setTimeout(() => {
                        updateAgentStatus(agentId, 'done', 'Concluído');
                        addLog('agent', `${agentId}: Tarefa concluída!`);
                        
                        if (i === 0 || i === 2) {
                            //Checkpoint after researcher and writer
                            setTimeout(() => {
                                showCheckpoint({ message: 'Conteúdo criado. Aprovar para continuar?' });
                            }, 500);
                        }
                    }, 1500);
                }, i * 2000);
            });
        }

        // Event listeners
        document.getElementById('agentList').addEventListener('click', (e) => {
            const item = e.target.closest('.agent-item');
            if (item) {
                document.querySelectorAll('.agent-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                showAgentDetail(item.dataset.id);
            }
        });

        // Conectar ao iniciar
        connect();
    </script>
</body>
</html>
